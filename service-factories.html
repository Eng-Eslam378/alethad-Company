<body>

                <a href="service-projects.html">تنفيذ المشاريع</a>

        <section class="about-section">
            <div class="section-head">
                <h2>مصانع خرسانة</h2>
                <p>انظر إلى مجموعة من الصور التي تعرض مشاريع إنشاء مصانع الخرسانة والتجهيزات الخاصة بها.</p>
            </div>
            <div class="gallery-grid">
                <img src="images/2.1.jpeg" alt="مصنع خرسانة 1">
                <img src="images/2.8.jpeg" alt="مصنع خرسانة 2">
                <img src="images/2.3.jpeg" alt="مصنع خرسانة 3">
                <img src="images/2.4.jpeg" alt="مصنع خرسانة 4">
                <img src="images/2.5.jpeg" alt="مصنع خرسانة 5">
                <img src="images/2.2.jpeg" alt="مصنع خرسانة 6">
                <img src="images/2.7.jpeg" alt="مصنع خرسانة 7">
                <img src="images/2.6.jpeg" alt="مصنع خرسانة 8">
               
            </div>
        </section>
        <div class="image-modal" id="imageModal">
            <button class="modal-close" id="modalClose">×</button>
            <img src="" alt="">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
+
    </div>
+
    <script>
        const modal = document.getElementById('imageModal');
        const modalImg = modal.querySelector('img');
        const modalCaption = document.getElementById('modalCaption');
        const modalClose = document.getElementById('modalClose');

        document.querySelectorAll('.gallery-grid img').forEach(img => {
            img.addEventListener('click', () => {
                modal.classList.add('open');
                modalImg.src = img.src;
                modalImg.alt = img.alt;
                modalCaption.textContent = img.alt;
            });
        });

        modalClose.addEventListener('click', () => {
            modal.classList.remove('open');
        });

        modal.addEventListener('click', event => {
            if (event.target === modal) {
                modal.classList.remove('open');
            }
        });
    </script>
</body>
