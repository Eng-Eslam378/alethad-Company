        <section class="about-section">
            <div class="section-head">
                <h2>دهانات وتنسيق</h2>
                <p>صور من مشاريع الدهانات والتنسيق الداخلي والخارجي التي قمنا بتنفيذها.</p>

            <div class="gallery-grid">
                <img src="images/4.9.jpeg" alt="دهان 1">
                <img src="images/4.2.jpeg" alt="دهان 2">
                <img src="images/4.3.jpeg" alt="دهان 3">

                <img src="images/4.5.jpeg" alt="دهان 5">

                <img src="images/3.8.jpeg" alt="دهان 8">
                
            </div>
        </section>
        <div class="image-modal" id="imageModal">
            <button class="modal-close" id="modalClose">×</button>
            <img src="" alt="">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
+
    </div>
+
    <script>
        const modal = document.getElementById('imageModal');
        const modalImg = modal.querySelector('img');
        const modalCaption = document.getElementById('modalCaption');
        const modalClose = document.getElementById('modalClose');

        document.querySelectorAll('.gallery-grid img').forEach(img => {
            img.addEventListener('click', () => {
                modal.classList.add('open');
                modalImg.src = img.src;
                modalImg.alt = img.alt;
                modalCaption.textContent = img.alt;
            });
        });

        modalClose.addEventListener('click', () => {
            modal.classList.remove('open');
        });

        modal.addEventListener('click', event => {
            if (event.target === modal) {
                modal.classList.remove('open');
            }
        });
    </script>
</body>
